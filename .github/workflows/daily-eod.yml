# M34: EOD pipeline sa SATNIM pokušajima — 16:20 -> 22:20 Europe/Zagreb,
# radnim danima (ZSE zatvara u 16:00, ali tečajnica zna kasniti satima;
# incident 16.07.2026.). Svaki run je kratak (bez sleep petlje): guard
# "already done" -> no-op; izvor bez podataka -> SUCCESS s "not yet" logom
# (čekanje rade cron termini); SAMO zadnji dnevni pokušaj bez podataka
# faila i alarmira (exit 3 iz daily.py). Nema always-on stroja: trajno
# stanje živi u Supabase Postgresu (secret ZSE_DSN), exporti se commitaju
# natrag u repo, deploy hook se okida TEK nakon potvrđenih novih podataka.
#
# Secreti (Settings -> Secrets and variables -> Actions; upisuje Boris,
# popis i upute u README):
#   ZSE_DSN                 postgres connection string (Supabase, sslmode=require)
#   ANTHROPIC_API_KEY       ekstrakcija novih izvješća (budžet-gated u kodu)
#   VERCEL_DEPLOY_HOOK_URL  rebuild produkcije nakon novih podataka
#   SUPABASE_URL            za auto-vijesti (news-ingest Edge Function)
#   BLOG_API_KEY            za auto-vijesti (isti ključ kao blog-publish)
name: daily-eod

on:
  schedule:
    # Satni pokušaji 16:20 -> 23:20 lokalno, za OBA DST offseta; DST guard
    # ispod propušta samo runove u lokalnom prozoru 16:00-24:00 (kombinacija
    # dvaju raspona pokriva i CEST i CET bez ručnog prebacivanja). Prozor
    # ide do kraja dana — pokušava se dok podaci ne stignu; vrijeme kad su
    # stigli se bilježi (eod_first_seen) pa se raspored kasnije kalibrira.
    - cron: '20 14-21 * * 1-5'   # 16:20-23:20 CEST (ljetno, UTC+2)
    - cron: '20 15-22 * * 1-5'   # 16:20-23:20 CET (zimsko, UTC+1)
  workflow_dispatch: {}           # ručno pokretanje (test / nadoknada dana)

concurrency:
  group: daily-eod
  cancel-in-progress: false    # run u tijeku se ne prekida; novi čeka

permissions:
  contents: write   # push exporta natrag u repo
  issues: write     # notifikacija na neuspjeh (issue s labelom pipeline-fail)

jobs:
  daily:
    runs-on: ubuntu-latest
    # no-op ~10-30 s; PUNI prolaz radi regen protiv udaljene Supabase baze
    # (mrežna latencija po SQL upitu) — run 21:12 16.07. ubijen na 30 min
    # bez ijednog retka loga (stdout je bio bufferiran). 60 min dok se ne
    # izmjeri stvarno trajanje; PYTHONUNBUFFERED streama log u živo.
    timeout-minutes: 60
    steps:
      # DST guard: dva cron raspona postoje jer se UTC offset mijenja
      # (CET/CEST) — dio termina je uvijek "krivi" za sat. Izvrši se samo
      # run koji padne u lokalni prozor 16:00-24:00 (širok namjerno:
      # GitHub cronovi kasne i do ~1,5 h — 16.07.2026. je zbog uskog
      # prozora 16-17h preskočen SVAKI zakazani run). Poslije ponoći se ne
      # nastavlja ("danas" bi postao krivi datum) — rupu zakrpa backfill
      # prvog sutrašnjeg uspješnog runa. Dispatch preskače guard.
      - name: DST guard (prozor 16-24h Europe/Zagreb)
        id: guard
        run: |
          H=$(TZ=Europe/Zagreb date +%H)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "$H" -ge 16 ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "lokalno vrijeme $(TZ=Europe/Zagreb date '+%H:%M') — pokrećem"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "lokalno vrijeme $(TZ=Europe/Zagreb date '+%H:%M') izvan prozora 16-24h — čisti izlaz bez posla"
          fi

      - name: Checkout
        if: steps.guard.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        if: steps.guard.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Ovisnosti
        if: steps.guard.outputs.run == 'true'
        run: pip install -r requirements.txt

      # daily.py: guard (already done?) -> jedan pokušaj cijena (bez
      # spavanja) -> uz podatke: backfill + watcher/extract/recompute +
      # regen exporta. Izlazi: "already done" / "not yet published" su
      # SUCCESS s did_work=false (normalno stanje satne serije, ne alarm);
      # exit 3 = zadnji dnevni pokušaj bez podataka -> failure + issue.
      # VERCEL_DEPLOY_HOOK_URL se OVDJE NE postavlja: exporti su na runneru
      # lokalni dok se ne pushaju, pa hook okida zaseban korak TEK nakon
      # commita (deploy samo nakon potvrde).
      - name: Dnevni prolaz (daily.py)
        if: steps.guard.outputs.run == 'true'
        id: daily
        env:
          ZSE_DSN: ${{ secrets.ZSE_DSN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PYTHONUNBUFFERED: '1'   # log u živo (16.07.: 30 min bez retka)
        run: |
          set -o pipefail
          python -m src.daily | tee daily-run.log
          if grep -qE '^(already done|not yet published)$' daily-run.log; then
            echo "did_work=false" >> "$GITHUB_OUTPUT"
            echo "no-op run (guard/not-yet) — koraci nakon ovog se preskaču"
          else
            echo "did_work=true" >> "$GITHUB_OUTPUT"
          fi

      # Auto-vijesti PRIJE deploya da nova vijest uđe u ISTI Vercel build
      # kao i dnevne cijene (prerender /vijesti čita Supabase pri buildu).
      # continue-on-error čuva pouzdanost objave cijena (16.07.2026.: pad
      # vijesti ne smije preskočiti commit/deploy) — pad se vidi u logu,
      # a SPA ionako čita vijesti uživo pa ne ovisi o buildu.
      - name: Auto-vijesti (published za činjenične kategorije, dedup)
        if: steps.guard.outputs.run == 'true' && steps.daily.outputs.did_work == 'true'
        continue-on-error: true   # vijesti su nice-to-have, ne uvjet objave
        env:
          ZSE_DSN: ${{ secrets.ZSE_DSN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          BLOG_API_KEY: ${{ secrets.BLOG_API_KEY }}
        run: python scripts/generate_news.py --lookback-days 3

      # GLAVNI ISHOD: commit + deploy neovisni o sporednim koracima.
      # [skip ci] sprječava petlju workflowa.
      - name: Commit exporta (ako ima promjena)
        if: steps.guard.outputs.run == 'true' && steps.daily.outputs.did_work == 'true'
        id: commit
        run: |
          git config user.name "daily-eod bot"
          git config user.email "noreply@burzovnilist.com"
          git add frontend/public/data
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "nema promjena u exportima — bez commita i bez deploya"
          else
            git commit -m "EOD $(TZ=Europe/Zagreb date +%F): osvježeni exporti [skip ci]"
            # -X theirs: exporti su GENERIRANE datoteke — kod konflikta s
            # commitom koji je stigao na main tijekom runa naša (svježija)
            # verzija smije pregaziti (incident 17.07.: rebase stao na
            # konfliktu u HT.json, retry petlja vrtjela pull preko
            # nerazriješenog konflikta i korak je pao "tiho" — bez exit 1
            # je deploy okinuo stari sadržaj).
            ok=false
            for i in 1 2 3 4; do
              if git pull --rebase -X theirs origin main && git push origin main; then
                ok=true; break
              fi
              git rebase --abort 2>/dev/null || true
              echo "push nije prošao — retry za $((2**i))s"; sleep $((2**i))
            done
            if [ "$ok" != "true" ]; then
              echo "::error::push exporta nije uspio nakon 4 pokušaja"
              exit 1
            fi
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy hook (samo nakon potvrđenih novih podataka)
        if: steps.guard.outputs.run == 'true' && steps.commit.outputs.changed == 'true'
        env:
          HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK" ]; then echo "VERCEL_DEPLOY_HOOK_URL nije postavljen"; exit 1; fi
          # Vercel hook povremeno vrati prolazni 502 (incident 17.07.) —
          # kratki retry umjesto pada cijelog runa na tuđem hipaku
          for i in 1 2 3; do
            curl -fsS -X POST "$HOOK" -o /dev/null && { echo "Vercel build pokrenut"; exit 0; }
            echo "hook nije prošao — retry za $((4*i))s"; sleep $((4*i))
          done
          echo "::error::Vercel deploy hook nije prošao (3 pokušaja)"
          exit 1

      # Sporedni koraci NAKON objave — njihov pad ne smije dirati exporte.
      - name: Digest artefakt
        if: always() && steps.guard.outputs.run == 'true' && steps.daily.outputs.did_work != 'false'
        uses: actions/upload-artifact@v4
        with:
          name: digest
          path: data/digests/*.md
          if-no-files-found: ignore
          retention-days: 30

      # v3 P.2: distribucijski alarm — kad >40% top-20 likvidnih imena ima
      # |raskorak| > 30%, otvara se issue s labelom calibration-review
      # (banner na /metodologija dolazi iz overview.json calibration_alert)
      - name: Distribucijski alarm (calibration-review)
        if: steps.guard.outputs.run == 'true' && steps.daily.outputs.did_work == 'true'
        run: |
          ACTIVE=$(python -c "import json;print(json.load(open('frontend/public/data/overview.json')).get('calibration_alert',{}).get('active',False))" 2>/dev/null || echo False)
          echo "CAL_ALERT=$ACTIVE" >> "$GITHUB_ENV"
      - name: Issue calibration-review (na alarm)
        if: env.CAL_ALERT == 'True'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const o = JSON.parse(fs.readFileSync('frontend/public/data/overview.json', 'utf8'));
            const a = o.calibration_alert || {};
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: `calibration-review: ${a.share_pct}% top-20 likvidnih s |raskorakom| > 30%`,
              body: `Distribucijski alarm (metodologija v3, faza P): ${a.big}/${a.eligible} kvalificiranih top-20 imena ima |raskorak| > 30% naspram sredine fer-zone.\n\nImena: ${(a.names || []).join(', ')}\n\nPravilo: zone se provjeravaju (ulazi/pretpostavke), NE prilagođavaju tržištu. Banner je automatski aktivan na /metodologija.`,
              labels: ['calibration-review'],
            });

      # Notifikacija: GitHub ionako mailira vlasnika na failed run; issue
      # ostavlja trajni trag (label pipeline-fail). Failure nastaje SAMO iz
      # (a) zadnjeg dnevnog pokušaja bez podataka (daily.py exit 3) ili
      # (b) stvarnog pada koda — "not yet" satni pokušaji su SUCCESS i ne
      # alarmiraju (najviše jedan alarm dnevno).
      - name: Issue na neuspjeh
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const d = new Date().toLocaleDateString('hr-HR', { timeZone: 'Europe/Zagreb' })
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `daily-eod pao — ${d}`,
              labels: ['pipeline-fail'],
              body: `EOD za ${d} nije objavljen do zadnjeg pokušaja (22:20) ili je run pao — ` +
                `zadržano prethodno stanje na sajtu.\n\n` +
                `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\n` +
                `Nadoknada: Actions tab -> daily-eod -> Run workflow (dispatch preskače guard; ` +
                `uspješan run sam backfilla jučerašnju rupu ako je izvor nudi).`,
            })
