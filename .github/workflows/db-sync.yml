# M35: sinkronizacija SADRŽAJNIH tablica u produkcijsku bazu (Supabase).
# Kurirani podaci (ekstrakcije, klasifikacije, holdings, povijest zona)
# nastaju u lokalnoj razvojnoj bazi; dump se commita u repo
# (data/sync/content_dump.json.gz), a ovaj workflow ga primjenjuje na
# produkciju po prirodnim ključevima. Pokreće se RUČNO nakon što je dump
# osvježen i mergean u main.
name: db-sync

on:
  workflow_dispatch:
    inputs:
      recompute:
        description: 'Tickeri za preračun valuacije nakon synca (zarezom, npr. ADPL)'
        required: false
        default: ''
      regen:
        description: 'Regeneriraj exporte + commit + deploy nakon synca (true/false)'
        required: false
        default: 'false'

concurrency:
  group: daily-eod     # ne smije se preklapati s daily runom (ista baza)
  cancel-in-progress: false

permissions:
  contents: write   # regen korak (opcionalan) commita osvježene exporte

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Ovisnosti
        run: pip install -r requirements.txt

      - name: Shema (idempotentne migracije)
        env:
          ZSE_DSN: ${{ secrets.ZSE_DSN }}
          PYTHONUNBUFFERED: '1'
        run: |
          python - <<'EOF'
          from src.db import get_conn
          from src.daily import ensure_schema
          with get_conn() as conn:
              ensure_schema(conn)
          print("shema ok")
          EOF

      - name: Sync sadržaja (dump -> produkcija)
        env:
          ZSE_DSN: ${{ secrets.ZSE_DSN }}
          PYTHONUNBUFFERED: '1'
        run: python -m scripts.db_sync apply

      # Novi/izmijenjeni sadržaj ne ulazi u valuacije sam od sebe (daily
      # recompute ide samo za taj dan ekstrahirane firme) — ovaj korak to
      # pokriva za eksplicitno navedene tickere.
      - name: Preračun valuacija (opcionalno)
        if: inputs.recompute != ''
        env:
          ZSE_DSN: ${{ secrets.ZSE_DSN }}
          RECOMPUTE: ${{ inputs.recompute }}
          PYTHONUNBUFFERED: '1'
        run: |
          python - <<'EOF'
          import datetime as dt, os
          from src.db import get_conn
          from src.daily import _logger, stage_recompute
          tickers = [t.strip().upper() for t in os.environ["RECOMPUTE"].split(",") if t.strip()]
          with get_conn() as conn, conn.cursor() as cur:
              cur.execute("SELECT id, ticker FROM companies WHERE ticker = ANY(%s)", (tickers,))
              rows = cur.fetchall()
              missing = set(tickers) - {t for _, t in rows}
              assert not missing, f"nepoznati tickeri: {missing}"
              run_id = f"db-sync-{dt.date.today().isoformat()}"
              stage_recompute(conn, run_id, _logger(conn, run_id), [i for i, _ in rows])
          print("preračun gotov:", tickers)
          EOF

      - name: Regen exporta + commit + deploy (opcionalno)
        if: inputs.regen == 'true'
        env:
          ZSE_DSN: ${{ secrets.ZSE_DSN }}
          PYTHONUNBUFFERED: '1'
        run: |
          python - <<'EOF'
          import datetime as dt
          from src.db import get_conn
          from src.daily import _logger, stage_regen
          with get_conn() as conn:
              run_id = f"db-sync-{dt.date.today().isoformat()}"
              stage_regen(conn, run_id, _logger(conn, run_id), changed=True)
          EOF
          git config user.name "db-sync bot"
          git config user.email "noreply@burzovnilist.com"
          git add frontend/public/data
          if git diff --cached --quiet; then echo "bez promjena"; exit 0; fi
          git commit -m "db-sync $(date +%Y-%m-%d): regen exporta nakon synca sadržaja [skip ci]"
          for i in 1 2 3 4; do
            git pull --rebase origin main && git push origin main && break
            git rebase --abort 2>/dev/null || true
            sleep $((2**i))
          done
          curl -fsS -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}" -o /dev/null
